<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#efece6" />
<link rel="manifest" href="./manifest.json?v=116">
<link rel="icon" href="./icon-192.png">
<title>EphemeralCypher</title>
<style>
:root{
--paper:#efece6;
--field:#faf9f5;
--ink:#1a1a1a;
--dim:#6f6b62;
--red:#bc3a26;
--line:#1a1a1a;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--paper)}
body{
color:var(--ink);
background:var(--paper);
font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",system-ui,sans-serif;
font-size:13.5px;line-height:1.85;
-webkit-font-smoothing:antialiased;
}
.wrap{max-width:720px;margin:0 auto;padding:26px 18px 80px;position:relative}

/* header */
header{position:relative;padding-right:44px;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:10px}
.mark{
width:20px;height:20px;background:var(--ink);flex:0 0 auto;
clip-path:polygon(50% 0,100% 0,50% 50%,100% 100%,50% 100%,0 100%,50% 50%,0 0);
}
h1{
font-size:16px;font-weight:700;letter-spacing:.42em;white-space:nowrap;
}
.seal{
position:absolute;top:0;right:0;
writing-mode:vertical-rl;
border:1px solid var(--red);color:var(--red);
font-size:10.5px;letter-spacing:.2em;
padding:7px 4px;user-select:none;
}
.notice{
border:1px solid var(--line);
padding:7px 10px;margin:14px 0 6px;
font-size:11px;color:var(--red);letter-spacing:.04em;line-height:1.7;
}
.lang{display:flex;gap:14px;margin:8px 0 2px;font-size:11px;letter-spacing:.18em}
.lang button{
appearance:none;border:0;background:transparent;cursor:pointer;
font:inherit;color:var(--dim);padding:2px 0;letter-spacing:inherit;
}
.lang button.active{color:var(--ink);border-bottom:2px solid var(--ink)}

/* sections */
section{border-top:2px solid var(--line);margin-top:26px;padding-top:14px}
.eyebrow{
font-size:10.5px;letter-spacing:.3em;color:var(--dim);
display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.eyebrow .no{color:var(--ink)}
h2{font-size:15px;font-weight:700;letter-spacing:.06em;margin:6px 0 2px}
.desc{font-size:11.5px;color:var(--dim);margin-bottom:12px}

.sub{
font-size:10.5px;letter-spacing:.22em;color:var(--dim);
margin:14px 0 5px;display:flex;justify-content:space-between;align-items:center;gap:10px;
}
input[type="url"],textarea{
width:100%;
border:1px solid var(--line);border-radius:2px;
background:var(--field);color:var(--ink);
padding:10px 11px;outline:none;
font-size:13.5px;line-height:1.7;
}
input[type="url"]::placeholder,textarea::placeholder{color:#a9a599}
input[type="url"]:focus,textarea:focus{border-color:var(--red)}
textarea{min-height:150px;resize:vertical}
textarea[readonly]{cursor:text}

.fileRow{display:flex;align-items:center;gap:9px}
.fileBtn{
position:relative;display:inline-flex;align-items:center;
border:1px solid var(--line);border-radius:2px;
background:var(--field);color:var(--ink);
padding:8px 12px;font-size:12px;letter-spacing:.06em;
cursor:pointer;white-space:nowrap;flex:0 0 auto;
}
.fileBtn:hover{background:#fff}
.fileBtn input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.fileName{
flex:1 1 auto;min-width:0;font-size:11.5px;color:var(--dim);
overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.x{
appearance:none;border:1px solid var(--line);background:var(--field);color:var(--ink);
border-radius:2px;width:26px;height:26px;line-height:1;cursor:pointer;
font-size:13px;flex:0 0 auto;
}
.x:hover{background:#fff}

.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}
.btn{
appearance:none;font:inherit;font-size:12.5px;font-weight:600;letter-spacing:.18em;
border-radius:2px;padding:10px 18px;cursor:pointer;
background:var(--ink);color:var(--paper);border:1px solid var(--ink);
}
.btn:hover{background:#000}
.btn.ghost{background:var(--field);color:var(--ink)}
.btn.ghost:hover{background:#fff}
.btn:disabled{
background:#d4d1c8;border-color:#d4d1c8;color:#8f8c83;cursor:not-allowed;
}
.btn.ghost:disabled{background:#e4e1d9;border-color:#c9c6bd;color:#9a978e}
.btn.mini{font-size:11.5px;font-weight:500;padding:8px 13px}

.status{margin-top:10px;font-size:11.5px;min-height:17px;color:var(--dim);letter-spacing:.03em}
.status.ok{color:var(--ink)}
.status.bad{color:var(--red)}

footer{
border-top:2px solid var(--line);margin-top:30px;padding-top:12px;
font-size:10.5px;color:var(--dim);letter-spacing:.1em;
}
:focus-visible{outline:2px solid var(--red);outline-offset:1px}
@media (max-width:400px){ h1{letter-spacing:.28em} }
</style>
</head>
<body>
<div class="wrap">

<header>
<div class="brand">
<div class="mark" aria-hidden="true"></div>
<h1>EPHEMERAL CYPHER</h1>
</div>
<div class="seal" aria-hidden="true">暗号</div>
<div class="notice" id="notice"></div>
<div class="lang" aria-label="Language">
<button id="btnJa" type="button">日本語</button>
<button id="btnEn" type="button">EN</button>
</div>
</header>

<!-- 01 KEY -->
<section>
<div class="eyebrow"><span><span class="no">01</span> — <span id="eb1">KEY MATERIAL</span></span></div>
<h2 id="h1s"></h2>
<p class="desc" id="d1"></p>

<div class="sub"><span id="lblUrl">SITE URL</span></div>
<input id="urlInput" type="url" inputmode="url" autocomplete="off" spellcheck="false" placeholder="https://example.com/page.html" />

<div class="sub"><span id="lblFile">HTML / TXT</span></div>
<div class="fileRow">
<div class="fileBtn"><span id="pickHtml">Choose file</span>
<input id="htmlFile" type="file" accept=".html,.htm,.txt,.md,text/plain,text/html" />
</div>
<div class="fileName" id="htmlName"></div>
<button class="x" id="clearHtml" type="button" aria-label="Clear file">×</button>
</div>

<div class="sub"><span id="lblImg">IMAGE</span></div>
<div class="fileRow">
<div class="fileBtn"><span id="pickImg">Choose image</span>
<input id="imgFile" type="file" accept="image/*" />
</div>
<div class="fileName" id="imgName"></div>
<button class="x" id="clearImg" type="button" aria-label="Clear image">×</button>
</div>
</section>

<!-- 02 MESSAGE -->
<section>
<div class="eyebrow"><span><span class="no">02</span> — <span id="eb2">MESSAGE</span></span></div>
<h2 id="h2s"></h2>
<p class="desc" id="d2"></p>

<div class="sub">
<span id="lblMsg">MESSAGE</span>
<span style="display:flex;gap:8px;align-items:center">
<span class="fileBtn" style="padding:5px 9px;font-size:11px"><span id="loadMsg">Load .txt</span>
<input id="msgFile" type="file" accept=".txt,text/plain" />
</span>
<button class="x" id="clearMsg" type="button" aria-label="Clear message">×</button>
</span>
</div>
<textarea id="msg" spellcheck="false"></textarea>

<div class="actions">
<button class="btn" id="enc" type="button">Encrypt</button>
<button class="btn" id="dec" type="button">Decrypt</button>
<button class="btn ghost" id="clearWork" type="button">Clear</button>
</div>
<div class="status" id="status" role="status"></div>
</section>

<!-- 03 RESULT -->
<section>
<div class="eyebrow"><span><span class="no">03</span> — <span id="eb3">RESULT</span></span></div>
<div style="height:8px"></div>
<textarea id="out" readonly placeholder=""></textarea>
<div class="actions">
<button class="btn ghost mini" id="copy" type="button">Copy</button>
<button class="btn ghost mini" id="save" type="button">Save .txt</button>
<button class="btn ghost mini" id="share" type="button" hidden>Share</button>
</div>
</section>

<footer id="foot"></footer>
</div>

<script>
(() => {
"use strict";

const STR = {
en: {
notice: "The ciphertext may be shared openly. Only those who can point at the same key material can decrypt. Everything runs on this device — no relay, no server.",
eb1: "KEY MATERIAL", eb2: "MESSAGE", eb3: "RESULT",
h1s: "Point at a page and/or an image",
d1: "Provide at least one: a URL, a saved HTML/TXT file, or an image.",
h2s: "Plaintext to encrypt, or ciphertext to decrypt",
d2: "Load a saved .txt to decrypt it directly.",
url: "SITE URL", fileLbl: "HTML / TXT", img: "IMAGE",
pickHtml: "Choose file", pickImg: "Choose image",
msg: "MESSAGE", loadMsg: "Load .txt",
msgPh: "Type a message to encrypt, or paste ciphertext to decrypt.",
outPh: "Result appears here.",
enc: "ENCRYPT", dec: "DECRYPT", clearWork: "CLEAR",
copy: "COPY", save: "SAVE .TXT", share: "SHARE",
needKey: "Select a URL, an HTML/TXT file, and/or an image.",
needMsg: "Enter a message.",
working: "Working…",
doneEnc: "GOOD — Encrypted.",
doneDec: "GOOD — Decrypted.",
badInput: "Invalid ciphertext format.",
fail: "OOPS — Failed. (Material changed, or a different material was used.)",
unreachable: "Could not load the URL. Save the page as an HTML file and attach it. Nothing is sent to any third party.",
copied: "Copied.", saved: "Saved.", shared: "Shared.",
clearedWork: "Message and result cleared. Key materials are kept.",
foot: "OFFLINE-READY · CLIENT-SIDE ONLY · NO RELAY · MIT"
},
ja: {
notice: "暗号文は公開しても構いません。同じ鍵素材を指せる人だけが復号できます。処理は端末内で完結 — 中継なし・サーバーなし。",
eb1: "鍵素材", eb2: "メッセージ", eb3: "結果",
h1s: "頁と画像を鍵にする",
d1: "URL、保存したHTML/TXTファイル、画像のいずれかを最低1つ。",
h2s: "暗号化する文、または復号する暗号文",
d2: "保存した.txtを読み込めば、そのまま復号できます。",
url: "サイトURL", fileLbl: "HTML / TXT", img: "画像",
pickHtml: "ファイルを選択", pickImg: "画像を選択",
msg: "メッセージ", loadMsg: ".txtを読み込み",
msgPh: "暗号化したい文章を入力、または暗号文を貼り付けて復号します。",
outPh: "結果がここに表示されます。",
enc: "暗号化", dec: "復号", clearWork: "クリア",
copy: "コピー", save: ".TXTで保存", share: "共有",
needKey: "URL、HTML/TXTファイル、画像のいずれかを選択してください。",
needMsg: "メッセージを入力してください。",
working: "処理中…",
doneEnc: "GOOD — 暗号化しました。",
doneDec: "GOOD — 復号しました。",
badInput: "暗号文の形式が不正です。",
fail: "OOPS — 失敗しました。（素材が変わったか、指し先が違います）",
unreachable: "URLを取得できません。頁をHTML保存して添付してください。第三者には何も送信されません。",
copied: "コピーしました。", saved: "保存しました。", shared: "共有しました。",
clearedWork: "メッセージと結果を消去しました。鍵素材は保持しています。",
foot: "オフライン対応 · 端末内処理のみ · 中継なし · MIT"
}
};

const $ = (id) => document.getElementById(id);
const els = {
notice: $("notice"),
eb1: $("eb1"), eb2: $("eb2"), eb3: $("eb3"),
h1s: $("h1s"), h2s: $("h2s"), d1: $("d1"), d2: $("d2"),
lblUrl: $("lblUrl"), lblFile: $("lblFile"), lblImg: $("lblImg"),
pickHtml: $("pickHtml"), pickImg: $("pickImg"),
lblMsg: $("lblMsg"), loadMsg: $("loadMsg"), msgFile: $("msgFile"),
msg: $("msg"), out: $("out"),
urlInput: $("urlInput"), htmlFile: $("htmlFile"), imgFile: $("imgFile"),
htmlName: $("htmlName"), imgName: $("imgName"),
clearHtml: $("clearHtml"), clearImg: $("clearImg"), clearMsg: $("clearMsg"),
enc: $("enc"), dec: $("dec"), clearWork: $("clearWork"),
copy: $("copy"), save: $("save"), share: $("share"),
status: $("status"), foot: $("foot"),
btnJa: $("btnJa"), btnEn: $("btnEn"),
};

let lang = (new URLSearchParams(location.search).get("lang") || "").toLowerCase();
const auto = navigator.language && navigator.language.toLowerCase().startsWith("ja") ? "ja" : "en";
if (lang !== "ja" && lang !== "en") lang = auto;

function setLang(next) {
lang = next;
const t = STR[lang];
els.notice.textContent = t.notice;
els.eb1.textContent = t.eb1;
els.eb2.textContent = t.eb2;
els.eb3.textContent = t.eb3;
els.h1s.textContent = t.h1s;
els.d1.textContent = t.d1;
els.h2s.textContent = t.h2s;
els.d2.textContent = t.d2;
els.lblUrl.textContent = t.url;
els.lblFile.textContent = t.fileLbl;
els.lblImg.textContent = t.img;
els.pickHtml.textContent = t.pickHtml;
els.pickImg.textContent = t.pickImg;
els.lblMsg.textContent = t.msg;
els.loadMsg.textContent = t.loadMsg;
els.msg.placeholder = t.msgPh;
els.out.placeholder = t.outPh;
els.enc.textContent = t.enc;
els.dec.textContent = t.dec;
els.clearWork.textContent = t.clearWork;
els.copy.textContent = t.copy;
els.save.textContent = t.save;
els.share.textContent = t.share;
els.foot.textContent = t.foot;
els.btnJa.classList.toggle("active", lang === "ja");
els.btnEn.classList.toggle("active", lang === "en");
updateButtons();
}
els.btnJa.addEventListener("click", () => setLang("ja"));
els.btnEn.addEventListener("click", () => setLang("en"));

function setStatus(text, kind="") {
els.status.textContent = text || "";
els.status.className = "status" + (kind ? " " + kind : "");
}

function hasKeySelected() {
const hasUrl = !!els.urlInput.value.trim();
const hasHtml = !!(els.htmlFile.files && els.htmlFile.files[0]);
const hasImg = !!(els.imgFile.files && els.imgFile.files[0]);
return hasUrl || hasHtml || hasImg;
}

function updateButtons() {
const t = STR[lang];
const keyOk = hasKeySelected();
const msgOk = !!els.msg.value.trim();
els.enc.disabled = !(keyOk && msgOk);
els.dec.disabled = !(keyOk && msgOk);
const hasOut = !!els.out.value;
els.copy.disabled = !hasOut;
els.save.disabled = !hasOut;
els.share.disabled = !hasOut;
if (!keyOk) setStatus(t.needKey, "");
else if (!msgOk) setStatus(t.needMsg, "");
else setStatus("", "");
}

// Mutual exclusion: URL vs HTML/TXT file
function syncHtmlUrlLock() {
const hasUrl = !!els.urlInput.value.trim();
const hasHtml = !!(els.htmlFile.files && els.htmlFile.files[0]);
if (hasHtml) {
els.urlInput.value = "";
els.urlInput.disabled = true;
} else {
els.urlInput.disabled = false;
}
if (hasUrl) {
els.htmlFile.value = "";
els.htmlName.textContent = "";
}
}

els.urlInput.addEventListener("input", () => { syncHtmlUrlLock(); updateButtons(); });
els.htmlFile.addEventListener("change", () => {
const f = els.htmlFile.files && els.htmlFile.files[0];
els.htmlName.textContent = f ? f.name : "";
syncHtmlUrlLock(); updateButtons();
});
els.imgFile.addEventListener("change", () => {
const f = els.imgFile.files && els.imgFile.files[0];
els.imgName.textContent = f ? f.name : "";
updateButtons();
});
els.clearHtml.addEventListener("click", () => {
els.htmlFile.value = ""; els.htmlName.textContent = "";
els.urlInput.disabled = false;
updateButtons();
});
els.clearImg.addEventListener("click", () => {
els.imgFile.value = ""; els.imgName.textContent = "";
updateButtons();
});
els.msgFile.addEventListener("change", async () => {
const f = els.msgFile.files && els.msgFile.files[0];
if (!f) return;
els.msg.value = await f.text();
els.msgFile.value = "";
updateButtons();
});
els.clearMsg.addEventListener("click", () => {
els.msg.value = ""; updateButtons(); els.msg.focus();
});
els.msg.addEventListener("input", updateButtons);

// Clear = message + result only. Key materials stay.
els.clearWork.addEventListener("click", () => {
els.msg.value = "";
els.out.value = "";
updateButtons();
setStatus(STR[lang].clearedWork, "");
setTimeout(()=>updateButtons(), 1600);
});

els.copy.addEventListener("click", async () => {
const t = STR[lang];
const txt = els.out.value || "";
if (!txt) return;
try {
await navigator.clipboard.writeText(txt);
setStatus(t.copied, "ok");
} catch (e) {
els.out.focus(); els.out.select();
document.execCommand("copy");
setStatus(t.copied, "ok");
}
setTimeout(updateButtons, 1200);
});

function stamp(){
const d = new Date(), p = (n)=>String(n).padStart(2,"0");
return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
}
els.save.addEventListener("click", () => {
const t = STR[lang];
const txt = els.out.value || "";
if (!txt) return;
const blob = new Blob([txt], {type:"text/plain;charset=utf-8"});
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = `ephemeral-cypher-${stamp()}.txt`;
document.body.appendChild(a); a.click(); a.remove();
setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
setStatus(t.saved, "ok");
setTimeout(updateButtons, 1200);
});

if (navigator.share) els.share.hidden = false;
els.share.addEventListener("click", async () => {
const t = STR[lang];
const txt = els.out.value || "";
if (!txt) return;
try {
await navigator.share({text: txt});
setStatus(t.shared, "ok");
} catch (e) { /* cancelled */ }
setTimeout(updateButtons, 1200);
});

// --- crypto helpers ---
const te = new TextEncoder();
const td = new TextDecoder();

function concatU8(...arrs) {
const total = arrs.reduce((s,a)=>s+(a?a.length:0),0);
const out = new Uint8Array(total);
let o=0;
for (const a of arrs) {
if (!a) continue;
out.set(a, o); o += a.length;
}
return out;
}

async function sha256(u8) {
const h = await crypto.subtle.digest("SHA-256", u8);
return new Uint8Array(h);
}

function b64enc(u8) {
let s = "";
const chunk = 0x8000;
for (let i=0;i<u8.length;i+=chunk) {
s += String.fromCharCode.apply(null, u8.subarray(i, i+chunk));
}
return btoa(s);
}

function b64dec(b64) {
const bin = atob(b64);
const out = new Uint8Array(bin.length);
for (let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
return out;
}

async function readTextFile(file) {
return await file.text();
}

function normalizeText(s) {
return (s || "").replace(/\s+/g, " ").trim().slice(0, 200000);
}

function normalizeHTML(html) {
try {
const doc = new DOMParser().parseFromString(html, "text/html");
for (const sel of ["script","style","noscript"]) {
doc.querySelectorAll(sel).forEach(n=>n.remove());
}
const title = (doc.querySelector("title")?.textContent || "").trim();
const bodyText = (doc.documentElement?.textContent || "");
return normalizeText(title + "\n" + bodyText);
} catch {
return normalizeText(html);
}
}

async function fetchTextWithTimeout(url, ms=8000) {
const ctrl = new AbortController();
const to = setTimeout(()=>ctrl.abort(), ms);
try {
const r = await fetch(url, {signal: ctrl.signal, credentials:"omit", cache:"no-store", mode:"cors"});
if (!r.ok) throw new Error("HTTP " + r.status);
return await r.text();
} finally {
clearTimeout(to);
}
}

// The pointed URL is fetched directly, or not at all. No relay.
async function loadHTMLKeyBytes() {
const url = els.urlInput.value.trim();
const file = els.htmlFile.files && els.htmlFile.files[0];
if (file) {
const txt = await readTextFile(file);
const isHtml = /\.(html?|xhtml)$/i.test(file.name) || (file.type || "").includes("html");
return te.encode(isHtml ? normalizeHTML(txt) : normalizeText(txt));
}
if (url) {
try {
const txt = await fetchTextWithTimeout(url, 8000);
return te.encode(normalizeHTML(txt));
} catch (e) {
const err = new Error("unreachable");
err.ec = "unreachable";
throw err;
}
}
return null;
}

// --- pHash (32x32 DCT -> 8x8) ---
function buildCosTable(N) {
const table = Array.from({length:N}, () => new Float64Array(N));
for (let u=0;u<N;u++) {
for (let x=0;x<N;x++) {
table[u][x] = Math.cos(((2*x+1)*u*Math.PI)/(2*N));
}
}
return table;
}
const COS32 = buildCosTable(32);

function dct1d(vec, N) {
const out = new Float64Array(N);
for (let u=0;u<N;u++) {
let sum = 0;
for (let x=0;x<N;x++) sum += vec[x] * COS32[u][x];
const c = (u===0) ? Math.sqrt(1/N) : Math.sqrt(2/N);
out[u] = c * sum;
}
return out;
}

function dct2d(mat, N) {
const tmp = Array.from({length:N}, ()=>new Float64Array(N));
for (let y=0;y<N;y++) {
tmp[y].set(dct1d(mat[y], N));
}
const out = Array.from({length:N}, ()=>new Float64Array(N));
for (let x=0;x<N;x++) {
const col = new Float64Array(N);
for (let y=0;y<N;y++) col[y] = tmp[y][x];
const d = dct1d(col, N);
for (let y=0;y<N;y++) out[y][x] = d[y];
}
return out;
}

async function imageToPHashBytes(file) {
const blobUrl = URL.createObjectURL(file);
try {
let bmp;
if ("createImageBitmap" in window) {
bmp = await createImageBitmap(file);
} else {
const img = new Image();
img.decoding = "async";
img.src = blobUrl;
await new Promise((res, rej)=>{ img.onload=res; img.onerror=rej; });
bmp = img;
}
const c = document.createElement("canvas");
const N = 32;
c.width = N; c.height = N;
const ctx = c.getContext("2d", {willReadFrequently:true});
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";
ctx.drawImage(bmp, 0, 0, N, N);
const data = ctx.getImageData(0,0,N,N).data;
const mat = Array.from({length:N}, ()=>new Float64Array(N));
for (let y=0;y<N;y++) {
for (let x=0;x<N;x++) {
const i = (y*N + x)*4;
mat[y][x] = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
}
}
const dct = dct2d(mat, N);
const size = 8;
const vals = [];
for (let y=0;y<size;y++) {
for (let x=0;x<size;x++) {
if (x===0 && y===0) continue;
vals.push(dct[y][x]);
}
}
vals.sort((a,b)=>a-b);
const med = vals[Math.floor(vals.length/2)] || 0;
const bytes = new Uint8Array(8);
let bitIndex = 0;
for (let y=0;y<size;y++) {
for (let x=0;x<size;x++) {
const bit = dct[y][x] > med ? 1 : 0;
bytes[bitIndex >> 3] |= (bit << (7 - (bitIndex & 7)));
bitIndex++;
}
}
return bytes;
} finally {
URL.revokeObjectURL(blobUrl);
}
}

async function collectMaterials() {
const htmlBytes = await loadHTMLKeyBytes();
const imgFile = els.imgFile.files && els.imgFile.files[0];
const imgHash = imgFile ? await imageToPHashBytes(imgFile) : null;
return { htmlBytes, imgHash };
}

// v1 (legacy): sha256("EC|1.1.2|" || sha256(html) || pHash || salt)
async function buildKeyBytesV1(m, salt) {
if (!m.htmlBytes && !m.imgHash) return null;
const domainSep = te.encode("EC|1.1.2|");
const htmlHash = m.htmlBytes ? await sha256(m.htmlBytes) : new Uint8Array(0);
const imgPart = m.imgHash ? m.imgHash : new Uint8Array(0);
return await sha256(concatU8(domainSep, htmlHash, imgPart, salt));
}

// v2: HKDF-SHA256(tagged material hashes, salt, info="EC|2.0|") -> AES-GCM-256
async function buildKeyV2(m, salt) {
if (!m.htmlBytes && !m.imgHash) return null;
const parts = [];
if (m.htmlBytes) parts.push(te.encode("H:"), await sha256(m.htmlBytes));
if (m.imgHash) parts.push(te.encode("I:"), m.imgHash);
const ikm = await crypto.subtle.importKey("raw", concatU8(...parts), "HKDF", false, ["deriveKey"]);
return await crypto.subtle.deriveKey(
{name:"HKDF", hash:"SHA-256", salt, info: te.encode("EC|2.0|")},
ikm,
{name:"AES-GCM", length:256},
false,
["encrypt","decrypt"]
);
}

async function importAesKey(keyBytes) {
return await crypto.subtle.importKey(
"raw",
keyBytes,
{name:"AES-GCM", length:256},
false,
["encrypt","decrypt"]
);
}

function randomBytes(n) {
const u = new Uint8Array(n);
crypto.getRandomValues(u);
return u;
}

async function encryptMessage(plain) {
const salt = randomBytes(16);
const iv = randomBytes(12);
const m = await collectMaterials();
const key = await buildKeyV2(m, salt);
if (!key) return null;
const ctBuf = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, te.encode(plain));
return "EC2:" + b64enc(concatU8(salt, iv, new Uint8Array(ctBuf)));
}

function parseEnvelope(s) {
const t = s.trim();
if (t.startsWith("EC2:")) return {v:2, b64:t.slice(4).trim()};
if (t.startsWith("EC1:")) return {v:1, b64:t.slice(4).trim()};
return {v:1, b64:t};
}

async function decryptMessage(cipherText) {
const env = parseEnvelope(cipherText);
let packed;
try {
packed = b64dec(env.b64);
} catch {
return {ok:false, reason:"bad"};
}
if (packed.length < (16+12+16)) return {ok:false, reason:"bad"};
const salt = packed.slice(0,16);
const iv = packed.slice(16,28);
const ct = packed.slice(28);
const m = await collectMaterials();
let key;
if (env.v === 2) {
key = await buildKeyV2(m, salt);
} else {
const keyBytes = await buildKeyBytesV1(m, salt);
key = keyBytes ? await importAesKey(keyBytes) : null;
}
if (!key) return {ok:false, reason:"bad"};
try {
const ptBuf = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
return {ok:true, text: td.decode(new Uint8Array(ptBuf))};
} catch {
return {ok:false, reason:"fail"};
}
}

async function runEncrypt() {
const t = STR[lang];
setStatus(t.working, "");
try {
const out = await encryptMessage(els.msg.value.trim());
if (!out) {
setStatus(t.needKey, "bad");
return;
}
els.out.value = out;
setStatus(t.doneEnc, "ok");
} catch (e) {
console.error(e);
setStatus(e && e.ec === "unreachable" ? t.unreachable : t.fail, "bad");
} finally {
setTimeout(updateButtons, 1600);
}
}

async function runDecrypt() {
const t = STR[lang];
setStatus(t.working, "");
try {
const res = await decryptMessage(els.msg.value.trim());
if (!res.ok) {
setStatus(res.reason==="bad" ? t.badInput : t.fail, "bad");
return;
}
els.out.value = res.text;
setStatus(t.doneDec, "ok");
} catch (e) {
console.error(e);
setStatus(e && e.ec === "unreachable" ? t.unreachable : t.fail, "bad");
} finally {
setTimeout(updateButtons, 1600);
}
}

els.enc.addEventListener("click", runEncrypt);
els.dec.addEventListener("click", runDecrypt);

setLang(lang);

// SW + one-shot reload on controller change
if ("serviceWorker" in navigator) {
window.addEventListener("load", async () => {
try {
const reg = await navigator.serviceWorker.register("./sw.js?v=118", {updateViaCache:"none"});
reg.update?.();
let reloaded = false;
navigator.serviceWorker.addEventListener("controllerchange", () => {
if (reloaded) return;
reloaded = true;
location.reload();
});
} catch (e) {
// ignore
}
});
}

})();
